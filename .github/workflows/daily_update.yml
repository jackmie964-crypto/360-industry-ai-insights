name: Daily 360 Industry AI Insights

on:
  schedule:
    # 每天北京时间早上8点运行 (UTC时间凌晨0点)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许在 GitHub 网页上通过按钮手动触发运行

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run AI Insight Generator
      env:
        # 这里的秘钥需要在 GitHub 仓库的 Settings -> Secrets and variables -> Actions 中配置
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python src/main.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add 360_Industry_Insights/
        # 如果有新生成的报告则提交，否则跳过
        git commit -m "🚀 Auto-update: Daily 360 Industry Insights" || echo "No changes to commit"
        git push